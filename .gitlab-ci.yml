stages:
  - lint
  - test
  - security

variables:
  PYTHON_VERSION: "3.12"

default:
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt

lint:
  stage: lint
  script:
    - pip install flake8
    - flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
    - flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

test:
  stage: test
  script:
    - python -m pytest tests/

security:bandit:
  stage: security
  script:
    - pip install bandit
    - bandit -r src/ -ll

security:safety:
  stage: security
  script:
    - pip install safety
    - safety check

# Nota: El script publish_public.ps1 se ejecuta manualmente desde el entorno local
# para asegurar el control total sobre el push a GitHub.
